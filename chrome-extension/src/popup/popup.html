<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Curator Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #09090b;
      --panel: rgba(20, 20, 25, 0.7);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f4f4f5;
      --text-muted: #a1a1aa;
      --primary: #c084fc;
      --primary-hover: #a855f7;
      --accent: #818cf8;
      --success: #34d399;
      --danger: #f87171;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 420px;
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      padding: 16px;
      overflow-x: hidden;
      border-radius: 12px;
    }

    /* Scrollbars */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.02);
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    /* Glass Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo {
      font-size: 24px;
      filter: drop-shadow(0 0 8px var(--primary));
      animation: pulse 3s infinite ease-in-out;
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #fff 0%, #c084fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .version {
      font-size: 10px;
      color: var(--text-muted);
      border: 1px solid var(--border);
      padding: 2px 6px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.03);
    }

    /* Stat Cards */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }

    .stat-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      text-align: center;
      backdrop-filter: blur(8px);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .stat-card:hover {
      border-color: rgba(192, 132, 252, 0.3);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(192, 132, 252, 0.05);
    }

    .stat-val {
      font-family: 'Outfit', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 2px;
    }

    .stat-lbl {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }

    /* Control Tabs */
    .tabs {
      display: flex;
      gap: 6px;
      background: rgba(255, 255, 255, 0.03);
      padding: 4px;
      border-radius: 8px;
      border: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      color: var(--text-muted);
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: rgba(192, 132, 252, 0.15);
      color: var(--text);
      box-shadow: inset 0 0 0 1px rgba(192, 132, 252, 0.3);
    }

    /* Tab content panes */
    .pane {
      display: none;
    }

    .pane.active {
      display: block;
      animation: fadeIn 0.3s ease-out;
    }

    /* Cards / Forms */
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      backdrop-filter: blur(8px);
      margin-bottom: 12px;
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    input, textarea, select {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
      transition: all 0.2s;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(192, 132, 252, 0.2);
    }

    button.btn-primary {
      width: 100%;
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      color: #000;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 13px;
      border: none;
      border-radius: 6px;
      padding: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s;
    }

    button.btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(192, 132, 252, 0.3);
    }

    button.btn-primary:active {
      transform: translateY(0);
    }

    /* GraphQL response console */
    .console-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .console-title {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 600;
    }

    pre.console-out {
      background: #000;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      color: #a7f3d0;
      max-height: 160px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    pre.console-out.error {
      color: #fca5a5;
    }

    /* List items styling */
    .list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    }

    .list-item:last-child {
      border-bottom: none;
    }

    .item-meta {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .item-title {
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
    }

    .item-subtitle {
      font-size: 10px;
      color: var(--text-muted);
    }

    /* Keyframes */
    @keyframes pulse {
      0%, 100% { filter: drop-shadow(0 0 4px var(--primary)); }
      50% { filter: drop-shadow(0 0 12px var(--primary)); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="brand">
      <span class="logo">🔮</span>
      <div>
        <h1>Curator Studio</h1>
      </div>
    </div>
    <span class="version">Extension v1.0</span>
  </header>

  <!-- Quick Statistics -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-val" id="stat-resources">-</div>
      <div class="stat-lbl">Resources</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="stat-relations">-</div>
      <div class="stat-lbl">Relations</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="stat-texts">-</div>
      <div class="stat-lbl">Texts</div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="tab-query">GraphQL Query</button>
    <button class="tab-btn" data-tab="tab-run">Run Curator</button>
    <button class="tab-btn" data-tab="tab-data">Local Data</button>
    <button class="tab-btn" data-tab="tab-logs">Debug Logs</button>
  </div>

  <!-- Panes -->
  <!-- 1. GraphQL Query Console -->
  <div class="pane active" id="tab-query">
    <div class="card">
      <div class="form-group">
        <label for="graphql-select">Select Template Query</label>
        <select id="graphql-select">
          <option value="getStats">Get Database Stats</option>
          <option value="getResources">Query Saved Resources</option>
          <option value="getTools">List Registered Tools</option>
          <option value="createResource">Create Stub Resource</option>
        </select>
      </div>
      <div class="form-group">
        <label for="graphql-input">GraphQL Query / Mutation</label>
        <textarea id="graphql-input" rows="7" placeholder="Type GraphQL query here..."></textarea>
      </div>
      <button class="btn-primary" id="btn-graphql-run">
        <span>Execute Query</span> ⚡
      </button>
    </div>

    <div class="console-header">
      <div class="console-title">JSON GraphQL Response</div>
      <div style="font-size: 9px; color: var(--success);" id="console-status">Ready</div>
    </div>
    <pre class="console-out" id="graphql-out">Run a query to inspect live database output...</pre>
  </div>

  <!-- 2. Run Curator Script Form -->
  <div class="pane" id="tab-run">
    <div class="card">
      <div class="form-group">
        <label for="script-input">Execute Curator Tool Chain Script</label>
        <textarea id="script-input" rows="7" placeholder="e.g. Curator.start().upsert_resource({ uri: '...' })"></textarea>
      </div>
      <button class="btn-primary" id="btn-script-run">
        <span>Compile and Run Pipeline</span> 🔮
      </button>
    </div>
  </div>

  <!-- 3. Local Data View -->
  <div class="pane" id="tab-data">
    <div class="card">
      <div style="margin-bottom: 8px; font-size: 11px; color: var(--text-muted); font-weight: 600;">Saved Resources</div>
      <div id="resources-list" style="max-height: 220px; overflow-y: auto; padding-right: 4px;">
        <div class="item-subtitle" style="text-align: center; padding: 20px 0;">No resources found. Try creating one!</div>
      </div>
    </div>
  </div>

  <!-- 4. Debug Logs View -->
  <div class="pane" id="tab-logs">
    <div class="card">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
        <span style="font-size: 11px; color: var(--text-muted); font-weight: 600;">System Event Logs</span>
        <div style="display: flex; gap: 6px;">
          <button id="btn-clear-logs" style="background: rgba(248, 113, 113, 0.15); border: 1px solid rgba(248, 113, 113, 0.3); color: var(--danger); padding: 2px 6px; border-radius: 4px; font-size: 9px; cursor: pointer;">Clear</button>
          <button id="btn-download-logs" style="background: rgba(192, 132, 252, 0.15); border: 1px solid rgba(192, 132, 252, 0.3); color: var(--primary); padding: 2px 6px; border-radius: 4px; font-size: 9px; cursor: pointer;">Download</button>
        </div>
      </div>
      <div id="logs-list" style="max-height: 200px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 9px; line-height: 1.4; padding-right: 4px; display: flex; flex-direction: column; gap: 6px; background: rgba(0,0,0,0.2); border-radius: 6px; padding: 8px;">
        <div class="item-subtitle" style="text-align: center; padding: 20px 0; color: var(--text-muted);">No logs captured yet.</div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
